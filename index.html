<!DOCTYPE html>
<html>
<head>
  <title>Työnhakuseuranta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

  <h1>Työnhakuseuranta</h1>

<div class="dashboard">
  <h2>Tilastot</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <p>Yhteensä</p>
      <h3 id="countTotal">0</h3>
    </div>

    <div class="stat-card">
      <p>Haettu</p>
      <h3 id="countHaettu">0</h3>
    </div>

    <div class="stat-card">
      <p>Haastattelu</p>
      <h3 id="countHaastattelu">0</h3>
    </div>

    <div class="stat-card">
      <p>Tarjous</p>
      <h3 id="countTarjous">0</h3>
    </div>

    <div class="stat-card">
      <p>Hylätty</p>
      <h3 id="countHylatty">0</h3>
    </div>
  </div>
</div>

<h2>Hakemusputki</h2>
<p class="section-description">Seuraa hakemustesi etenemistä vaihe vaiheelta.</p>

<div class="pipeline">
  <div class="pipeline-column column-haettu">
    <h3>Haettu</h3>
    <div id="columnHaettu" class="pipeline-list"></div>
  </div>

  <div class="pipeline-column column-haastattelu">
    <h3>Haastattelu</h3>
    <div id="columnHaastattelu" class="pipeline-list"></div>
  </div>

  <div class="pipeline-column column-tarjous">
    <h3>Tarjous</h3>
    <div id="columnTarjous" class="pipeline-list"></div>
  </div>

  <div class="pipeline-column column-hylatty">
    <h3>Hylätty</h3>
    <div id="columnHylatty" class="pipeline-list"></div>
  </div>
</div>

  <form id="jobForm">
    <input type="text" id="jobTitle" placeholder="Työpaikan nimi" required><br><br>
    <input type="text" id="company" placeholder="Yritys" required><br><br>

    <select id="status">
  <option value="Haettu">Haettu</option>
  <option value="Haastattelu">Haastattelu</option>
  <option value="Tarjous">Tarjous</option>
  <option value="Hylätty">Hylätty</option>
</select><br><br>

    <button type="submit">Lisää hakemus</button>
  </form>

  <h2>Omat hakemukset</h2>

  <input type="text" id="searchInput" placeholder="Hae yrityksen tai työpaikan nimellä">
  <br><br>

  <ul id="jobList"></ul>

  <script src="script.js"></script>

   </div>
</body>
</html>
