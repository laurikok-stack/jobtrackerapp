<!DOCTYPE html>
<html>
<head>
  <h1>TAMA ON TESTI</h1>
  <title>Työnhakuseuranta</title>
  <h1>TESTI 123</h1>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Työnhakuseuranta</h1>
  
  <div id="stats">
  <h2>Tilastot</h2>
  <p>Haettu: <span id="countHaettu">0</span></p>
  <p>Haastattelu: <span id="countHaastattelu">0</span></p>
  <p>Hylätty: <span id="countHylatty">0</span></p>
</div>


  <form id="jobForm">
    <input type="text" id="jobTitle" placeholder="Työpaikan nimi" required><br><br>
    <input type="text" id="company" placeholder="Yritys" required><br><br>

    <select id="status">
      <option value="Haettu">Haettu</option>
      <option value="Haastattelu">Haastattelu</option>
      <option value="Hylätty">Hylätty</option>
    </select><br><br>

    <button type="submit">Lisää hakemus</button>
  </form>

  <h2>Omat hakemukset</h2>

  <input type="text" id="searchInput" placeholder="Hae yrityksen tai työpaikan nimellä">
<br><br>

  <ul id="jobList"></ul>

  <script src="script.js"></script>

</body>
</html>
